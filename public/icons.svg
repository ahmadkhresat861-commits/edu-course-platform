<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edu Platform</title>

  <style>
    /* ✅ CSS */
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .navbar {
      display: flex;
      gap: 25px;
      padding: 15px 30px;
      background: #020617;
      align-items: center;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #cbd5f5;
      transition: 0.2s;
    }

    .nav-item:hover {
      color: #6366f1;
    }

    .icon {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      transition: 0.2s;
    }

    .nav-item:hover .icon {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- ✅ SVG ICONS -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">

    <symbol id="icon-home" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
        d="M3 10.5L12 3l9 7.5M5 9.5V20h5v-6h4v6h5V9.5"/>
    </symbol>

    <symbol id="icon-courses" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="1.8"
        d="M4 6h16M4 12h16M4 18h10"/>
    </symbol>

    <symbol id="icon-dashboard" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="1.8"
        d="M3 3h8v8H3zM13 3h8v5h-8zM13 10h8v11h-8zM3 13h8v8H3z"/>
    </symbol>

    <symbol id="icon-quiz" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="1.8"
        d="M9 9a3 3 0 1 1 6 0c0 2-3 2-3 4M12 17h.01M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0z"/>
    </symbol>

  </svg>

  <!-- ✅ NAVBAR -->
  <div class="navbar">

    <div class="nav-item">
      <svg class="icon"><use href="#icon-home"></use></svg>
      Home
    </div>

    <div class="nav-item">
      <svg class="icon"><use href="#icon-courses"></use></svg>
      Courses
    </div>

    <div class="nav-item">
      <svg class="icon"><use href="#icon-dashboard"></use></svg>
      Dashboard
    </div>

    <div class="nav-item">
      <svg class="icon"><use href="#icon-quiz"></use></svg>
      Quiz
    </div>

  </div>

</body>
</html>
