<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Book shape -->
  <path d="M12 14C12 11.8 13.8 10 16 10H48C50.2 10 52 11.8 52 14V50C52 52.2 50.2 54 48 54H16C13.8 54 12 52.2 12 50V14Z"
        fill="url(#grad)" opacity="0.15"/>

  <!-- Open book lines -->
  <path d="M18 18H46" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M18 26H40" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M18 34H44" stroke="url(#grad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Graduation cap icon -->
  <path d="M32 6L58 18L32 30L6 18L32 6Z" fill="url(#grad)" filter="url(#glow)"/>

  <path d="M22 28V38C22 41 28 44 32 44C36 44 42 41 42 38V28"
        stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>

  <!-- Small dot (student success) -->
  <circle cx="32" cy="46" r="2.5" fill="#22C55E"/>
</svg>
